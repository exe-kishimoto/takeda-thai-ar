<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>タイ料理メニュー AR（実物大）</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    /* A-Frame標準のVR/ARボタン・モーダルを非表示 */
    .a-enter-vr, .a-enter-ar, .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-loader-title { display: none !important; }
    #intro { position: fixed; inset: 0; z-index: 30; background: linear-gradient(160deg, #14243f, #7a1e1e); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    #intro h1 { font-size: 21px; margin-bottom: 8px; font-weight: 700; }
    #intro p { font-size: 15px; opacity: .92; line-height: 1.8; margin-bottom: 26px; }
    #startBtn { font-size: 17px; padding: 14px 36px; border: 0; border-radius: 999px; background: #e0703a; color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 6px 20px rgba(224,112,58,.4); }
    #startBtn:active { transform: scale(.97); }
    #scanHint { position: fixed; left: 0; right: 0; bottom: 128px; z-index: 20; text-align: center; color: #fff; font-size: 15px; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,.8); transition: opacity .4s; }
    #scanHint .box { display: inline-block; background: rgba(0,0,0,.55); padding: 10px 20px; border-radius: 999px; }
    #loader { position: fixed; inset: 0; z-index: 25; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.6); color: #fff; font-size: 15px; }
    #bubble { position: fixed; left: 50%; top: 54px; transform: translateX(-50%) scale(.9); z-index: 22; max-width: 86%; background: #fff; color: #2a2118; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.6; box-shadow: 0 8px 24px rgba(0,0,0,.35); opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; }
    #bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
    #bubble::after { content: ""; position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%); border: 10px solid transparent; border-top-color: #fff; border-bottom: 0; }
    #hintOps { position: fixed; left: 0; right: 0; bottom: 82px; z-index: 19; text-align: center; color: #fff; font-size: 12px; opacity: 0; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,.85); transition: opacity .4s; }
    #hintOps.show { opacity: .9; }
    #bar { position: fixed; left: 0; right: 0; bottom: 18px; z-index: 20; display: none; justify-content: flex-start; gap: 7px; padding: 0 10px; overflow-x: auto; white-space: nowrap; }
    #bar::-webkit-scrollbar { display: none; }
    #bar .wrap { margin: 0 auto; display: inline-flex; gap: 7px; }
    #bar button { flex: 0 0 auto; border: 0; border-radius: 999px; padding: 9px 13px; background: rgba(0,0,0,.6); color: #fff; font-size: 13px; cursor: pointer; }
    #bar button.on { background: #e0703a; }
    .ui { touch-action: none; }
    #tuneToggle { position: fixed; right: 12px; top: 12px; z-index: 21; width: 44px; height: 44px; border-radius: 50%; border: 0; background: rgba(0,0,0,.5); color: #fff; font-size: 20px; cursor: pointer; display: none; }
    #tune { position: fixed; right: 12px; top: 66px; z-index: 21; display: none; background: rgba(0,0,0,.8); color: #fff; padding: 14px; border-radius: 12px; font-size: 12px; width: 230px; max-height: 82vh; overflow: auto; }
    #tune label { display: block; margin: 8px 0 2px; }
    #tune input[type=range] { width: 100%; }
    #tune input[type=number] { width: 64px; }
    #tune .val { float: right; opacity: .8; }
    #tune code { font-size: 11px; color: #ffd; word-break: break-all; }
    #tune hr { border: 0; border-top: 1px solid rgba(255,255,255,.2); margin: 12px 0; }
    #calcBtn { margin-top: 8px; width: 100%; padding: 8px; border: 0; border-radius: 8px; background: #e0703a; color: #fff; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div id="intro">
    <h1>🍽 タイ料理メニュー AR</h1>
    <p>「はじめる」でカメラを許可し、<br>気になる料理の<b>写真にカメラを向けて</b>ください。<br>実物大の3Dで登場して、音声で説明します。</p>
    <button id="startBtn">▶ はじめる</button>
  </div>

  <div id="scanHint" style="display:none"><span class="box">📸 料理の写真にカメラを向けてください</span></div>
  <div id="loader">3Dモデルを読み込み中…</div>
  <div id="bubble"></div>
  <div id="hintOps">左右ドラッグ＝回す　ピンチ＝拡大　タップ＝説明　↺で正面</div>

  <div id="bar"><span class="wrap">
    <button id="spinBtn" class="ui">⏸ 回転</button>
    <button id="talkBtn" class="ui">💬 説明</button>
    <button id="rulerBtn" class="ui">📏 定規</button>
    <button id="refBtn" class="ui">💳 カード</button>
    <button id="soundBtn" class="ui">🔊 音声</button>
    <button id="resetBtn" class="ui">↺ 正面</button>
  </span></div>

  <button id="tuneToggle" class="ui">⚙️</button>
  <div id="tune" class="ui">
    <strong>実寸合わせ</strong>
    <label>メニュー写真の印刷幅 <input type="number" id="cMarker" value="11" step="0.5"> cm</label>
    <label>料理（皿）の実寸幅 <input type="number" id="cDish" value="26" step="1"> cm</label>
    <button id="calcBtn">この実寸に合わせる</button>
    <hr>
    <strong>ブレ防止（揺れる時ほど左へ）</strong>
    <label>安定 ⇔ 追従 <span class="val" id="vJit">18</span></label>
    <input type="range" id="sJit" min="1" max="50" step="1" value="18">
    <hr>
    <strong>微調整</strong>
    <label>大きさ <span class="val" id="vScale">0.80</span></label>
    <input type="range" id="sScale" min="0.1" max="3.0" step="0.02" value="0.80">
    <label>高さ（浮き）<span class="val" id="vY">0.00</span></label>
    <input type="range" id="sY" min="-0.3" max="0.8" step="0.01" value="0.00">
    <label>傾き（X回転）<span class="val" id="vTilt">90</span></label>
    <input type="range" id="sTilt" min="0" max="180" step="1" value="90">
    <div style="margin-top:10px"><code id="dump"></code></div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1; autoStart: false; uiScanning: no; uiLoading: no; uiError: no; missTolerance: 10; warmupTolerance: 2;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    smoother>

    <a-assets>
      <a-asset-item id="gapaoAsset" src="./assets/gapao.glb"></a-asset-item>
      <a-asset-item id="kaomangaiAsset" src="./assets/kaomangai.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <!-- トラッカー（空・写真の位置を検出） -->
    <a-entity class="tracker" data-key="gapao" mindar-image-target="targetIndex: 0"></a-entity>
    <a-entity class="tracker" data-key="kaomangai" mindar-image-target="targetIndex: 1"></a-entity>

    <!-- 表示コンテンツ（トラッカーへ強力に平滑追従＝揺れ/パルス対策） -->
    <a-entity class="content" data-key="gapao" visible="false">
      <a-plane class="ruler" visible="false" position="0 0 0.004" material="src: ./assets/ruler.png; transparent: true; shader: flat; side: double"></a-plane>
      <a-entity class="yaw"><a-entity class="pitch">
        <a-gltf-model class="model" src="#gapaoAsset" rotation="90 0 0" position="0 0 0.2" scale="0.8 0.8 0.8"></a-gltf-model>
      </a-entity></a-entity>
    </a-entity>
    <a-entity class="content" data-key="kaomangai" visible="false">
      <a-plane class="ruler" visible="false" position="0 0 0.004" material="src: ./assets/ruler.png; transparent: true; shader: flat; side: double"></a-plane>
      <a-entity class="yaw"><a-entity class="pitch">
        <a-gltf-model class="model" src="#kaomangaiAsset" rotation="90 0 0" position="0 0 0.2" scale="0.8 0.8 0.8"></a-gltf-model>
      </a-entity></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const THREE = AFRAME.THREE;
    const sceneEl = document.querySelector('a-scene');
    const loader  = document.getElementById('loader');
    const scanHint= document.getElementById('scanHint');
    const bubble  = document.getElementById('bubble');
    const hintOps = document.getElementById('hintOps');
    const NATIVE_W = 1.898;

    const META = {
      gapao: { halfH: 0.332, audio: 'assets/audio-gapao.mp3', lines: [
        'ガイパットガパオライス ¥1,210（税込）', '鶏ひき肉のバジル炒め＋目玉焼き', 'ピリ辛でごはんが進む人気メニュー' ]},
      kaomangai: { halfH: 0.210, audio: 'assets/audio-kaomangai.mp3', lines: [
        'カオマンガイ ¥1,298（税込）', '鶏の旨みごはん＋しっとり蒸し鶏', '甘辛の特製ダレでどうぞ' ]}
    };

    const st = { scale: 0.80, userY: 0.0, tilt: 90 };
    const S = { active: null, yaw: 0, pitch: 0, spinVel: 0, autoSpin: true, dragging: false, smoothTau: 200 };
    let showRuler = false, showRefs = false, soundOn = true, lineIdx = 0;

    // DOM参照
    const dishes = {};
    document.querySelectorAll('.content').forEach(content => {
      const key = content.dataset.key;
      dishes[key] = {
        key, content,
        tracker: document.querySelector(`.tracker[data-key="${key}"]`),
        ruler: content.querySelector('.ruler'), yaw: content.querySelector('.yaw'), pitch: content.querySelector('.pitch'),
        model: content.querySelector('.model'),
        _init: false,
        ...META[key]
      };
    });
    Object.values(dishes).forEach(buildRefs);

    function seat(d) {
      const baseSeat = d.halfH * st.scale;
      d.model.setAttribute('scale', `${st.scale} ${st.scale} ${st.scale}`);
      d.model.setAttribute('rotation', `${st.tilt} 0 0`);
      d.model.setAttribute('position', `0 0 ${(baseSeat + st.userY).toFixed(3)}`);
      updateRuler(d); updateRefs(d);
    }
    function updateRuler(d) {
      const mCm = +document.getElementById('cMarker').value || 11;
      const w = 30 / mCm, h = 2.4 / mCm;
      const yOff = -(st.scale * NATIVE_W * 0.5 + h * 0.5 + 0.12);
      d.ruler.setAttribute('geometry', `primitive: plane; width: ${w.toFixed(3)}; height: ${h.toFixed(3)}`);
      d.ruler.setAttribute('position', `0 ${yOff.toFixed(3)} 0.004`);
      d.ruler.setAttribute('visible', showRuler);
    }
    function buildRefs(d) {
      const card = document.createElement('a-plane');
      card.setAttribute('material', 'src: ./assets/refcard.png; transparent: true; shader: flat; side: double');
      card.setAttribute('visible', 'false'); d.content.appendChild(card); d.card = card;
    }
    function updateRefs(d) {
      if (!d.card) return;
      const u = 1 / (+document.getElementById('cMarker').value || 11);
      const dishHalf = st.scale * NATIVE_W * 0.5;
      const cw = 8.56 * u, ch = 5.4 * u;
      d.card.setAttribute('geometry', `primitive: plane; width: ${cw.toFixed(3)}; height: ${ch.toFixed(3)}`);
      d.card.setAttribute('position', `${(-(dishHalf + cw * 0.5 + 0.1)).toFixed(3)} 0 0.004`);
      d.card.setAttribute('visible', showRefs);
    }
    function refreshPanel() {
      document.getElementById('vScale').textContent = st.scale.toFixed(2);
      document.getElementById('vY').textContent = st.userY.toFixed(2);
      document.getElementById('vTilt').textContent = st.tilt;
      document.getElementById('dump').textContent = `scale ${st.scale.toFixed(2)} / tilt ${st.tilt}`;
    }
    function applyAll() { Object.values(dishes).forEach(seat); refreshPanel(); }

    // ★平滑追従（毎フレーム、トラッカーの実表示状態で判定＝フリーズ/残留を防ぐ）
    const _p = new THREE.Vector3(), _q = new THREE.Quaternion(), _s = new THREE.Vector3();
    AFRAME.registerComponent('smoother', {
      tick: function (time, dt) {
        dt = Math.min(dt || 16.7, 60);
        const k = 1 - Math.exp(-dt / S.smoothTau);
        let found = null;
        for (const key in dishes) {
          const d = dishes[key];
          const o = d.tracker.object3D; o.updateWorldMatrix(true, false);
          o.matrixWorld.decompose(_p, _q, _s);
          const valid = o.visible && _s.x > 1e-6 && isFinite(_p.x) && isFinite(_q.x) && isFinite(_s.x);
          if (valid) {
            found = d;
            if (!d._init) { d.content.object3D.position.copy(_p); d.content.object3D.quaternion.copy(_q); d.content.object3D.scale.copy(_s); d.content.setAttribute('visible', true); d._init = true; }
            else { d.content.object3D.position.lerp(_p, k); d.content.object3D.quaternion.slerp(_q, k); d.content.object3D.scale.lerp(_s, k); }
          } else if (d._init) {
            d._init = false; d.content.setAttribute('visible', false);
          }
        }
        // アクティブ料理の切替
        if (found !== S.active) {
          S.active = found;
          if (found) { S.yaw = 0; S.pitch = 0; S.spinVel = 0; seat(found); lineIdx = 0; showBubble(found.lines[0]); playAudio(found); scanHint.style.opacity = '0'; }
          else { scanHint.style.opacity = '1'; hideBubble(); stopAudio(); }
        }
        // 回転（自動＋フリック慣性）
        if (S.active) {
          const f = dt / 16.67;
          if (!S.dragging) { if (S.autoSpin) S.yaw += 0.35 * f; S.yaw += S.spinVel * f; S.spinVel *= Math.pow(0.94, f); if (Math.abs(S.spinVel) < 0.01) S.spinVel = 0; }
          S.active.yaw.object3D.rotation.z = THREE.MathUtils.degToRad(S.yaw);
          S.active.pitch.object3D.rotation.x = THREE.MathUtils.degToRad(S.pitch);
        }
      }
    });

    // 読み込み
    let loaded = 0;
    Object.values(dishes).forEach(d => {
      d.model.addEventListener('model-loaded', () => { if (++loaded >= 2) loader.style.display = 'none'; });
      d.model.addEventListener('model-error', () => { loader.style.display = 'none'; });
    });

    // 開始
    document.getElementById('startBtn').addEventListener('click', async () => {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('tuneToggle').style.display = 'block';
      loader.style.display = 'flex';
      setTimeout(() => { loader.style.display = 'none'; }, 8000);
      unlockAudio();
      try {
        if (!sceneEl.hasLoaded) await new Promise(r => sceneEl.addEventListener('loaded', r, { once: true }));
        await sceneEl.systems['mindar-image-system'].start();
        scanHint.style.display = 'block';
        document.getElementById('bar').style.display = 'flex';
        hintOps.classList.add('show'); setTimeout(() => hintOps.classList.remove('show'), 6000);
        applyAll(); applyJitter();
        if (Object.values(dishes).every(d => d.model.getObject3D('mesh'))) loader.style.display = 'none';
      } catch (e) { loader.style.display = 'none'; alert('カメラを開始できませんでした: ' + e.message); }
    });

    // 音声（Web Audio）
    let actx = null; const buffers = {}; let curSource = null;
    async function initAudio() {
      try { actx = new (window.AudioContext || window.webkitAudioContext)();
        await Promise.all(Object.values(dishes).map(async d => { try { const ab = await (await fetch(d.audio)).arrayBuffer(); buffers[d.key] = await actx.decodeAudioData(ab); } catch (e) {} }));
      } catch (e) { actx = null; }
    }
    function unlockAudio() { if (actx && actx.state === 'suspended') actx.resume(); }
    function playAudio(d) { if (!soundOn || !actx || !buffers[d.key]) return; if (actx.state === 'suspended') actx.resume(); stopAudio(); try { const s = actx.createBufferSource(); s.buffer = buffers[d.key]; s.connect(actx.destination); s.start(0); curSource = s; } catch (e) {} }
    function stopAudio() { if (curSource) { try { curSource.stop(); } catch (e) {} curSource = null; } }
    initAudio();

    // 回転はsmoother内で処理（別ループ不要）

    // ボタン
    document.getElementById('spinBtn').addEventListener('click', (e) => { S.autoSpin = !S.autoSpin; e.target.textContent = (S.autoSpin ? '⏸' : '▶') + ' 回転'; });
    function talkNext() { if (!S.active) return; showBubble(S.active.lines[(++lineIdx) % S.active.lines.length]); playAudio(S.active); }
    document.getElementById('talkBtn').addEventListener('click', talkNext);
    document.getElementById('soundBtn').addEventListener('click', (e) => { soundOn = !soundOn; e.target.textContent = (soundOn ? '🔊' : '🔇') + ' 音声'; if (!soundOn) stopAudio(); });
    document.getElementById('rulerBtn').addEventListener('click', (e) => { showRuler = !showRuler; e.target.classList.toggle('on', showRuler); Object.values(dishes).forEach(updateRuler); });
    document.getElementById('refBtn').addEventListener('click', (e) => { showRefs = !showRefs; e.target.classList.toggle('on', showRefs); Object.values(dishes).forEach(updateRefs); });
    // ↺ 正面：向きを正面に戻す（大きさ・実寸設定はそのまま）
    document.getElementById('resetBtn').addEventListener('click', () => { S.yaw = 0; S.pitch = 0; S.spinVel = 0; });

    // 吹き出し
    let bubbleTimer = null;
    function showBubble(t) { bubble.textContent = t; bubble.classList.add('show'); clearTimeout(bubbleTimer); bubbleTimer = setTimeout(hideBubble, 6500); }
    function hideBubble() { bubble.classList.remove('show'); }

    // タッチ操作
    const pointers = new Map();
    let pinchStartDist = 0, pinchStartScale = 0.8, lastX = 0, lastY = 0, lastMoveDx = 0, downTime = 0, moved = 0;
    const isUI = (t) => t && t.closest && t.closest('.ui');
    window.addEventListener('pointerdown', (e) => {
      if (isUI(e.target)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1) { S.dragging = true; lastX = e.clientX; lastY = e.clientY; lastMoveDx = 0; downTime = Date.now(); moved = 0; }
      else if (pointers.size === 2) { const p = [...pointers.values()]; pinchStartDist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y); pinchStartScale = st.scale; }
    });
    window.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1 && S.dragging && S.active) {
        const dx = e.clientX - lastX, dy = e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; lastMoveDx = dx; moved += Math.abs(dx) + Math.abs(dy);
        // 指で回し始めたら自動回転を止める（操作が取り合いにならないように）
        if (S.autoSpin && moved > 8) { S.autoSpin = false; document.getElementById('spinBtn').textContent = '▶ 回転'; }
        S.yaw += dx * 0.5;   // 横回転（ターンテーブル）のみ。縦の傾きは無効化して「斜め迷子」を防止
      } else if (pointers.size === 2) {
        const p = [...pointers.values()]; const dist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
        if (pinchStartDist > 0) { st.scale = Math.min(3.0, Math.max(0.05, pinchStartScale * (dist / pinchStartDist))); document.getElementById('sScale').value = st.scale; applyAll(); }
      }
    });
    function endPointer(e) {
      if (!pointers.has(e.pointerId)) return; pointers.delete(e.pointerId);
      if (pointers.size < 2) pinchStartDist = 0;
      if (pointers.size === 0) { S.dragging = false; S.spinVel = lastMoveDx * 0.4; if (moved < 12 && (Date.now() - downTime) < 350 && S.active) talkNext(); }
      else if (pointers.size === 1) { const p = [...pointers.values()][0]; lastX = p.x; lastY = p.y; }
    }
    window.addEventListener('pointerup', endPointer);
    window.addEventListener('pointercancel', endPointer);

    // 微調整・実寸・ブレ防止
    const tune = document.getElementById('tune');
    document.getElementById('tuneToggle').addEventListener('click', () => { tune.style.display = tune.style.display === 'block' ? 'none' : 'block'; });
    document.getElementById('sScale').oninput = e => { st.scale = +e.target.value; applyAll(); };
    document.getElementById('sY').oninput     = e => { st.userY = +e.target.value; applyAll(); };
    document.getElementById('sTilt').oninput  = e => { st.tilt  = +e.target.value; applyAll(); };
    function applyJitter() { const v = +document.getElementById('sJit').value; document.getElementById('vJit').textContent = v; S.smoothTau = (51 - v) * 11; }
    document.getElementById('sJit').oninput = applyJitter;
    document.getElementById('calcBtn').addEventListener('click', () => {
      const markerCm = +document.getElementById('cMarker').value, dishCm = +document.getElementById('cDish').value;
      if (markerCm > 0 && dishCm > 0) { st.scale = dishCm / (NATIVE_W * markerCm); document.getElementById('sScale').value = st.scale; applyAll(); }
    });

    applyJitter(); applyAll();
  </script>
</body>
</html>

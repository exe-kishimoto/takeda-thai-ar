<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>タイ料理メニュー AR（実物大）</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }

    #intro { position: fixed; inset: 0; z-index: 30; background: linear-gradient(160deg, #14243f, #7a1e1e);
      color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    #intro h1 { font-size: 21px; margin-bottom: 8px; font-weight: 700; }
    #intro p { font-size: 15px; opacity: .92; line-height: 1.8; margin-bottom: 26px; }
    #startBtn { font-size: 17px; padding: 14px 36px; border: 0; border-radius: 999px; background: #e0703a; color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 6px 20px rgba(224,112,58,.4); }
    #startBtn:active { transform: scale(.97); }

    #scanHint { position: fixed; left: 0; right: 0; bottom: 116px; z-index: 20; text-align: center; color: #fff; font-size: 15px; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,.8); transition: opacity .4s; }
    #scanHint .box { display: inline-block; background: rgba(0,0,0,.55); padding: 10px 20px; border-radius: 999px; }
    #loader { position: fixed; inset: 0; z-index: 25; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.6); color: #fff; font-size: 15px; }

    #bubble { position: fixed; left: 50%; top: 56px; transform: translateX(-50%) scale(.9); z-index: 22; max-width: 84%;
      background: #fff; color: #2a2118; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.6;
      box-shadow: 0 8px 24px rgba(0,0,0,.35); opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; }
    #bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
    #bubble::after { content: ""; position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%); border: 10px solid transparent; border-top-color: #fff; border-bottom: 0; }

    #bar { position: fixed; left: 0; right: 0; bottom: 16px; z-index: 20; display: none; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 8px; pointer-events: none; }
    #bar button { pointer-events: auto; border: 0; border-radius: 999px; padding: 9px 14px; background: rgba(0,0,0,.55); color: #fff; font-size: 13px; cursor: pointer; }
    #hintOps { position: fixed; left: 0; right: 0; bottom: 66px; z-index: 20; text-align: center; color: #fff; font-size: 12px; opacity: .85; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,.8); }

    .ui { touch-action: none; }
    #tuneToggle { position: fixed; right: 12px; top: 12px; z-index: 21; width: 44px; height: 44px; border-radius: 50%; border: 0; background: rgba(0,0,0,.5); color: #fff; font-size: 20px; cursor: pointer; display: none; }
    #tune { position: fixed; right: 12px; top: 66px; z-index: 21; display: none; background: rgba(0,0,0,.78); color: #fff; padding: 14px; border-radius: 12px; font-size: 12px; width: 226px; max-height: 80vh; overflow: auto; }
    #tune label { display: block; margin: 8px 0 2px; }
    #tune input[type=range] { width: 100%; }
    #tune input[type=number] { width: 64px; }
    #tune .val { float: right; opacity: .8; }
    #tune code { font-size: 11px; color: #ffd; word-break: break-all; }
    #tune hr { border: 0; border-top: 1px solid rgba(255,255,255,.2); margin: 12px 0; }
    #calcBtn { margin-top: 8px; width: 100%; padding: 8px; border: 0; border-radius: 8px; background: #e0703a; color: #fff; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div id="intro">
    <h1>🍽 タイ料理メニュー AR</h1>
    <p>「はじめる」でカメラを許可し、<br>気になる料理の<b>写真にカメラを向けて</b>ください。<br>その料理が実物大の3Dで登場して説明します。</p>
    <button id="startBtn">▶ はじめる</button>
  </div>

  <div id="scanHint" style="display:none"><span class="box">📸 料理の写真にカメラを向けてください</span></div>
  <div id="loader">3Dモデルを読み込み中…</div>
  <div id="bubble"></div>

  <div id="hintOps" style="display:none">ドラッグ＝回転　ピンチ＝拡大　タップ＝説明　⚙️で実寸合わせ</div>
  <div id="bar">
    <button id="spinBtn" class="ui">⏸ 自動回転</button>
    <button id="talkBtn" class="ui">💬 説明</button>
    <button id="soundBtn" class="ui">🔊 音声</button>
    <button id="resetBtn" class="ui">↺ リセット</button>
  </div>

  <button id="tuneToggle" class="ui">⚙️</button>
  <div id="tune" class="ui">
    <strong>実寸合わせ</strong>
    <label>メニュー写真の印刷幅 <input type="number" id="cMarker" value="11" step="0.5"> cm</label>
    <label>料理（皿）の実寸幅 <input type="number" id="cDish" value="26" step="1"> cm</label>
    <button id="calcBtn">この実寸に合わせる</button>
    <hr>
    <strong>微調整</strong>
    <label>大きさ <span class="val" id="vScale">1.20</span></label>
    <input type="range" id="sScale" min="0.1" max="3.0" step="0.02" value="1.20">
    <label>高さ（浮き）<span class="val" id="vY">0.00</span></label>
    <input type="range" id="sY" min="-0.3" max="0.8" step="0.01" value="0.00">
    <label>傾き（X回転）<span class="val" id="vTilt">90</span></label>
    <input type="range" id="sTilt" min="0" max="180" step="1" value="90">
    <div style="margin-top:10px">現在値:<br><code id="dump"></code></div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1; autoStart: false; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.00008; filterBeta: 8; missTolerance: 8; warmupTolerance: 3;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="gapaoAsset" src="./assets/gapao.glb"></a-asset-item>
      <a-asset-item id="kaomangaiAsset" src="./assets/kaomangai.glb"></a-asset-item>
    </a-assets>

    <!-- カメラは固定（ジャイロ・デバイス方位は未使用） -->
    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

    <!-- index 0: ガパオの写真 -->
    <a-entity class="dishTarget" data-key="gapao" mindar-image-target="targetIndex: 0">
      <a-entity class="yaw" rotation="0 0 0">
        <a-entity class="pitch" rotation="0 0 0">
          <a-entity class="reveal" animation__reveal="property: scale; from: 0 0 0; to: 1 1 1; dur: 650; easing: easeOutBack; startEvents: doReveal">
            <a-gltf-model class="model" src="#gapaoAsset" rotation="90 0 0" position="0 0 0.2" scale="1.2 1.2 1.2"></a-gltf-model>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- index 1: カオマンガイの写真 -->
    <a-entity class="dishTarget" data-key="kaomangai" mindar-image-target="targetIndex: 1">
      <a-entity class="yaw" rotation="0 0 0">
        <a-entity class="pitch" rotation="0 0 0">
          <a-entity class="reveal" animation__reveal="property: scale; from: 0 0 0; to: 1 1 1; dur: 650; easing: easeOutBack; startEvents: doReveal">
            <a-gltf-model class="model" src="#kaomangaiAsset" rotation="90 0 0" position="0 0 0.2" scale="1.2 1.2 1.2"></a-gltf-model>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const loader  = document.getElementById('loader');
    const scanHint= document.getElementById('scanHint');
    const bubble  = document.getElementById('bubble');

    // 料理定義（写真ごと）
    const META = {
      gapao: { halfH: 0.332, lines: [
        'ガイパットガパオライスだよ！鶏ひき肉をホーリーバジルで炒めた、タイの大人気ごはん。',
        '目玉焼きをくずして、ピリ辛のガパオとごはんを一緒に。箸が止まらないよ！',
        'ライス付き ¥1,210（税込）。この大きさで一皿。実物大、伝わるかな？'
      ]},
      kaomangai: { halfH: 0.210, lines: [
        'カオマンガイ！鶏の旨みで炊いたごはんに、しっとり蒸し鶏をのせたタイのチキンライス。',
        '甘辛の特製ダレをかけて食べてね。やさしい味で万人ウケするよ。',
        'ライス付き ¥1,298（税込）。ボリュームもこの通り！'
      ]}
    };
    const NATIVE_W = 1.898;

    // 共有の見た目パラメータ（実寸合わせ・微調整で変化）
    const st = { scale: 1.20, userY: 0.0, tilt: 90 };

    // 各料理のDOM参照を収集
    const dishes = {};
    document.querySelectorAll('.dishTarget').forEach(t => {
      const key = t.dataset.key;
      dishes[key] = {
        key, target: t,
        yaw: t.querySelector('.yaw'), pitch: t.querySelector('.pitch'),
        reveal: t.querySelector('.reveal'), model: t.querySelector('.model'),
        ...META[key]
      };
    });

    let active = null;              // 現在写っている料理
    let yaw = 0, pitch = 0, spinVel = 0, autoSpin = true, dragging = false;
    const AUTO_SPEED = 0.35;

    function seat(d) {
      const baseSeat = d.halfH * st.scale;
      d.model.setAttribute('scale', `${st.scale} ${st.scale} ${st.scale}`);
      d.model.setAttribute('rotation', `${st.tilt} 0 0`);
      d.model.setAttribute('position', `0 0 ${(baseSeat + st.userY).toFixed(3)}`);
    }
    function refreshPanel() {
      document.getElementById('vScale').textContent = st.scale.toFixed(2);
      document.getElementById('vY').textContent = st.userY.toFixed(2);
      document.getElementById('vTilt').textContent = st.tilt;
      document.getElementById('dump').textContent = `scale ${st.scale.toFixed(2)} / tilt ${st.tilt}`;
    }
    function applyAll() { Object.values(dishes).forEach(seat); refreshPanel(); }

    // ===== 読み込み（フォールバックで固まらない） =====
    let loadedCount = 0;
    Object.values(dishes).forEach(d => {
      d.model.addEventListener('model-loaded', () => { if (++loadedCount >= 2) loader.style.display = 'none'; });
      d.model.addEventListener('model-error', () => { loader.style.display = 'none'; });
    });

    // ===== 開始 =====
    document.getElementById('startBtn').addEventListener('click', async () => {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('tuneToggle').style.display = 'block';
      loader.style.display = 'flex';
      setTimeout(() => { loader.style.display = 'none'; }, 8000);  // 保険：8秒で必ず消す
      try {
        if (!sceneEl.hasLoaded) await new Promise(r => sceneEl.addEventListener('loaded', r, { once: true }));
        await sceneEl.systems['mindar-image-system'].start();
        scanHint.style.display = 'block';
        document.getElementById('bar').style.display = 'flex';
        document.getElementById('hintOps').style.display = 'block';
        applyAll();
        startSpinLoop();
        // 既にプリロード済みなら即座にローダーを消す（model-loadedが開始前に発火済みのケース対策）
        if (Object.values(dishes).every(d => d.model.getObject3D('mesh'))) loader.style.display = 'none';
      } catch (e) {
        loader.style.display = 'none';
        alert('カメラを開始できませんでした: ' + e.message + '\nhttps でアクセスしていますか？カメラ許可はOK？');
      }
    });

    // ===== 各料理の検出 =====
    Object.values(dishes).forEach(d => {
      d.target.addEventListener('targetFound', () => {
        active = d; scanHint.style.opacity = '0';
        yaw = 0; pitch = 0; spinVel = 0;
        d.yaw.setAttribute('rotation', '0 0 0'); d.pitch.setAttribute('rotation', '0 0 0');
        seat(d); d.reveal.emit('doReveal'); lineIdx = 0; talk(0);
      });
      d.target.addEventListener('targetLost', () => {
        if (active === d) { active = null; scanHint.style.opacity = '1'; hideBubble(); }
      });
    });

    // ===== 回転ループ =====
    function startSpinLoop() {
      (function tick() {
        if (active && !dragging) {
          if (autoSpin) yaw += AUTO_SPEED;
          yaw += spinVel; spinVel *= 0.94; if (Math.abs(spinVel) < 0.01) spinVel = 0;
          active.yaw.setAttribute('rotation', `0 0 ${yaw}`);
        }
        requestAnimationFrame(tick);
      })();
    }

    // ===== ボタン =====
    document.getElementById('spinBtn').addEventListener('click', (e) => { autoSpin = !autoSpin; e.target.textContent = (autoSpin ? '⏸' : '▶') + ' 自動回転'; });
    document.getElementById('talkBtn').addEventListener('click', () => talk());
    let soundOn = true;
    document.getElementById('soundBtn').addEventListener('click', (e) => { soundOn = !soundOn; e.target.textContent = (soundOn ? '🔊' : '🔇') + ' 音声'; if (!soundOn && window.speechSynthesis) speechSynthesis.cancel(); });
    document.getElementById('resetBtn').addEventListener('click', () => {
      yaw = 0; pitch = 0; spinVel = 0; st.userY = 0; st.tilt = 90;
      document.getElementById('sY').value = 0; document.getElementById('sTilt').value = 90;
      if (active) { active.yaw.setAttribute('rotation', '0 0 0'); active.pitch.setAttribute('rotation', '0 0 0'); }
      applyAll();
    });

    // ===== しゃべる =====
    let lineIdx = 0, bubbleTimer = null;
    function talk(forceIdx) {
      if (!active) return;
      const lines = active.lines;
      const text = (typeof forceIdx === 'number') ? lines[forceIdx] : lines[lineIdx % lines.length];
      if (typeof forceIdx !== 'number') lineIdx++;
      showBubble(text);
      if (soundOn && window.speechSynthesis) {
        try { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 1.0; u.pitch = 1.1; speechSynthesis.speak(u); } catch (e) {}
      }
    }
    function showBubble(t) { bubble.textContent = t; bubble.classList.add('show'); clearTimeout(bubbleTimer); bubbleTimer = setTimeout(hideBubble, 6500); }
    function hideBubble() { bubble.classList.remove('show'); }

    // ===== タッチ操作 =====
    const pointers = new Map();
    let pinchStartDist = 0, pinchStartScale = 1.2, lastX = 0, lastY = 0, lastMoveDx = 0, downTime = 0, moved = 0;
    const isUI = (t) => t && t.closest && t.closest('.ui');

    window.addEventListener('pointerdown', (e) => {
      if (isUI(e.target)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1) { dragging = true; lastX = e.clientX; lastY = e.clientY; lastMoveDx = 0; downTime = Date.now(); moved = 0; }
      else if (pointers.size === 2) { const p = [...pointers.values()]; pinchStartDist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y); pinchStartScale = st.scale; }
    });
    window.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1 && dragging && active) {
        const dx = e.clientX - lastX, dy = e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; lastMoveDx = dx; moved += Math.abs(dx) + Math.abs(dy);
        yaw += dx * 0.4; pitch = Math.max(-100, Math.min(100, pitch + dy * 0.4));
        active.yaw.setAttribute('rotation', `0 0 ${yaw}`); active.pitch.setAttribute('rotation', `${pitch} 0 0`);
      } else if (pointers.size === 2) {
        const p = [...pointers.values()]; const dist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
        if (pinchStartDist > 0) { st.scale = Math.min(3.0, Math.max(0.05, pinchStartScale * (dist / pinchStartDist))); document.getElementById('sScale').value = st.scale; applyAll(); }
      }
    });
    function endPointer(e) {
      if (!pointers.has(e.pointerId)) return; pointers.delete(e.pointerId);
      if (pointers.size < 2) pinchStartDist = 0;
      if (pointers.size === 0) { dragging = false; spinVel = lastMoveDx * 0.4; if (moved < 12 && (Date.now() - downTime) < 350 && active) talk(); }
      else if (pointers.size === 1) { const p = [...pointers.values()][0]; lastX = p.x; lastY = p.y; }
    }
    window.addEventListener('pointerup', endPointer);
    window.addEventListener('pointercancel', endPointer);

    // ===== 微調整・実寸合わせ =====
    const tune = document.getElementById('tune');
    document.getElementById('tuneToggle').addEventListener('click', () => { tune.style.display = tune.style.display === 'block' ? 'none' : 'block'; });
    document.getElementById('sScale').oninput = e => { st.scale = +e.target.value; applyAll(); };
    document.getElementById('sY').oninput     = e => { st.userY = +e.target.value; applyAll(); };
    document.getElementById('sTilt').oninput  = e => { st.tilt  = +e.target.value; applyAll(); };
    document.getElementById('calcBtn').addEventListener('click', () => {
      const markerCm = +document.getElementById('cMarker').value;   // 印刷された料理写真の幅
      const dishCm = +document.getElementById('cDish').value;       // 実際の皿の幅
      if (markerCm > 0 && dishCm > 0) {
        // 1単位 = マーカー写真の幅。料理幅 = scale * NATIVE_W * markerCm
        st.scale = dishCm / (NATIVE_W * markerCm);
        document.getElementById('sScale').value = st.scale; applyAll();
      }
    });

    applyAll();
  </script>
</body>
</html>
